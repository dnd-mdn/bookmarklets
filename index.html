<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Bookmarklet Library</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha256-PI8n5gCcz9cQqQXm3PEtDuPG8qx9oFsFctPg0S5zb8g=" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/editor/editor.main.min.css" integrity="sha256-+0Bqa3EGZmDaai2pwA3tkb/Xdikf0AHpVcmqi5PVB6w=" crossorigin="anonymous">
	<style>
		html,
		body {
			height: 100%;
		}

		body {
			margin: 0;
			height: 100dvh;
			min-height: 100dvh;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			font-family: "Segoe UI", sans-serif;
			background:
				radial-gradient(circle at 10% 20%, #fff4cf 0%, transparent 38%),
				radial-gradient(circle at 85% 15%, #cceee0 0%, transparent 40%),
				#f6f4ef;
		}

		.top-navbar {
			background: linear-gradient(90deg, rgba(8, 20, 33, 0.95) 0%, rgba(23, 43, 62, 0.95) 100%);
			border-bottom: 1px solid rgba(182, 156, 92, 0.35);
		}

		.top-navbar .navbar-brand {
			font-weight: 600;
			letter-spacing: 0.02em;
		}

		.main-shell {
			display: flex;
			flex-direction: column;
			flex: 1;
			min-height: 0;
			padding: 1rem;
			overflow: hidden;
		}

		.main-row {
			flex: 1;
			min-height: 0;
			margin: 0;
			--bs-gutter-x: 1rem;
			--bs-gutter-y: 1rem;
		}

		.card {
			border-color: #d7d0c4;
			box-shadow: 0 8px 20px rgba(30, 33, 36, 0.08);
		}

		#script-list {
			flex: 1;
			max-height: none;
			overflow: auto;
		}

		.script-item-btn {
			white-space: normal;
		}

		.script-item-btn.active {
			background-color: #0f6d57;
			border-color: #0f6d57;
		}

		#editor {
			min-height: 0;
			flex: 1;
			border-radius: 0 0 var(--bs-card-border-radius) var(--bs-card-border-radius);
			overflow: hidden;
		}

		#status {
			min-height: 1.1rem;
		}

		@media (max-width: 860px) {
			body {
				height: auto;
				min-height: 100vh;
				overflow: auto;
			}

			.main-shell {
				overflow: visible;
			}

			.main-row {
				min-height: auto;
			}

			#editor {
				min-height: 320px;
			}
		}
	</style>

</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark top-navbar px-3 px-lg-4">
		<a class="navbar-brand" href="#">Bookmarklet Library</a>
		<div class="ms-auto text-white-50 small">Library Viewer</div>
	</nav>

	<div class="container-fluid main-shell">
		<div class="row g-3 main-row">
			<aside class="col-12 col-lg-3">
				<div class="card h-100">
					<div class="card-body d-flex flex-column gap-2">
						<h1 class="h5 mb-0">Bookmarklet Library</h1>
						<p class="text-body-secondary mb-2">Select a script to preview and generate a draggable bookmarklet link.</p>
						<ul id="script-list" class="list-group list-group-flush rounded"></ul>
						<p id="status" class="small text-body-secondary mt-auto mb-0" aria-live="polite"></p>
					</div>
				</div>
			</aside>

			<main class="col-12 col-lg-9">
				<div class="card h-100 d-flex flex-column">
					<div class="card-header bg-white py-3">
						<h2 id="script-name" class="h4 mb-1">No script selected</h2>
						<p id="script-meta" class="text-body-secondary small mb-0"></p>
					</div>

					<div class="px-3 py-3 border-bottom d-flex flex-wrap align-items-center gap-2 flex-shrink-0">
						<a id="bookmarklet-link" class="btn btn-success rounded-pill" href="#">Drag to Bookmarks Bar</a>
						<p class="text-body-secondary small mb-0">Drag this button into your browser bookmarks/favorites bar.</p>
					</div>

					<section id="editor" aria-label="Bookmarklet source code"></section>
				</div>
			</main>
		</div>
	</div>

	<script>
		const scriptListEl = document.getElementById("script-list");
		const statusEl = document.getElementById("status");
		const scriptNameEl = document.getElementById("script-name");
		const scriptMetaEl = document.getElementById("script-meta");
		const bookmarkletLinkEl = document.getElementById("bookmarklet-link");

		let editor;
		let currentButton = null;

		function setStatus(message) {
			statusEl.textContent = message;
		}

		async function encodeBookmarkletHref(scriptSource) {
			const result = await Terser.minify(scriptSource, {
				compress: true,
				mangle: true
			});
			return "javascript:" + encodeURIComponent(result.code);
		}

		async function fetchJson(path) {
			const response = await fetch(path, { cache: "no-store" });
			if (!response.ok) {
				throw new Error(`Failed to fetch ${path}: ${response.status}`);
			}
			return response.json();
		}

		async function fetchScript(path) {
			const response = await fetch(path, { cache: "no-store" });
			if (!response.ok) {
				throw new Error(`Failed to fetch ${path}: ${response.status}`);
			}
			return response.text();
		}

		function updateSelectedButton(nextButton) {
			if (currentButton) {
				currentButton.removeAttribute("aria-current");
				currentButton.classList.remove("active");
			}
			currentButton = nextButton;
			if (currentButton) {
				currentButton.setAttribute("aria-current", "true");
				currentButton.classList.add("active");
			}
		}

		async function loadScript(entry, buttonEl) {
			try {
				setStatus("Loading script...");
				const path = `scripts/${entry.file}`;
				const source = await fetchScript(path);
				const metaParts = [entry.file];
				if (entry.version) {
					metaParts.push(`Version: ${entry.version}`);
				}
				if (entry.description) {
					metaParts.push(entry.description);
				}
				editor.setValue(source);
				scriptNameEl.textContent = entry.name;
				scriptMetaEl.textContent = metaParts.join(" - ");
				bookmarkletLinkEl.textContent = entry.name;
				bookmarkletLinkEl.href = await encodeBookmarkletHref(source);
				updateSelectedButton(buttonEl);
				setStatus("Ready");
			} catch (error) {
				setStatus(error.message);
			}
		}

		function normalizeEntry(rawEntry) {
			if (typeof rawEntry === "string") {
				return {
					name: rawEntry.replace(/\.js$/i, ""),
					file: rawEntry,
					description: ""
				};
			}
			if (!rawEntry || typeof rawEntry.file !== "string") {
				throw new Error("Invalid manifest entry. Use a string filename or an object with a file property.");
			}
			return {
				name: rawEntry.name || rawEntry.file.replace(/\.js$/i, ""),
				file: rawEntry.file,
				description: rawEntry.description || "",
				version: rawEntry.version || ""
			};
		}

		function renderList(entries) {
			scriptListEl.innerHTML = "";

			entries.forEach((entry) => {
				const li = document.createElement("li");
				li.className = "list-group-item p-0 border-0";

				const button = document.createElement("button");
				button.type = "button";
				button.className = "script-item-btn list-group-item list-group-item-action";
				button.textContent = entry.name;
				button.title = entry.file;
				button.addEventListener("click", () => loadScript(entry, button));

				li.appendChild(button);
				scriptListEl.appendChild(li);
			});
		}

		function createEditor() {
			return new Promise((resolve) => {
				window.require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs" } });
				window.require(["vs/editor/editor.main"], () => {
					const monacoEditor = monaco.editor.create(document.getElementById("editor"), {
						value: "// Pick a script from the left panel",
						language: "javascript",
						readOnly: true,
						automaticLayout: true,
						minimap: { enabled: false },
						lineNumbersMinChars: 3,
						tabSize: 4,
						insertSpaces: true,
						theme: "vs"
					});
					resolve(monacoEditor);
				});
			});
		}

		async function init() {
			try {
				setStatus("Loading editor...");
				editor = await createEditor();

				setStatus("Loading manifest...");
				const manifest = await fetchJson("scripts/manifest.json");
				const entries = manifest.map(normalizeEntry);

				if (entries.length === 0) {
					setStatus("No scripts listed in scripts/manifest.json");
					return;
				}

				renderList(entries);
				await loadScript(entries[0], scriptListEl.querySelector("button"));
			} catch (error) {
				setStatus(error.message);
			}
		}

		window.addEventListener("load", init);
	</script>
	<script src="https://cdn.jsdelivr.net/npm/terser@5/dist/bundle.min.js" integrity="sha256-i6/IavlSkPPuKNP1Sjzv+X6F30QDdPCNjEhKI2uFDns=" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.js" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha256-CDOy6cOibCWEdsRiZuaHf8dSGGJRYuBGC+mjoJimHGw=" crossorigin="anonymous"></script>
</body>
</html>
